<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trang đăng nhập</title>

    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <h1>Đăng nhập</h1>
    <p>Email:</p>
    <input type="text" id="txtEmail" />
    <p>Mật khẩu:</p>
    <input type="password" id="txtPassword" />
    <br />
    <br />
    <button id="btnLogin">Đăng nhập</button>

    <p class="error hidden">Đăng nhập thất bại. Vui lòng kiểm tra lại.</p>

    <!-- 
    
    Đường dẫn tương đối (relative path):
      + ./ là đi đến thư mục chứa file hiện hành
      + / là đi đến thư mục root (gốc)
    
    Đường dẫn tuyệt đối (absolute path): 

    -->
    <script src="./js/main.js"></script>
  </body>
</html>
